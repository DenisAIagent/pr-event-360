services:
  db:
    image: postgres:16-alpine
    container_name: pr_event_360_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prevent
      POSTGRES_PASSWORD: prevent
      POSTGRES_DB: pr_event_360
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prevent -d pr_event_360"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
