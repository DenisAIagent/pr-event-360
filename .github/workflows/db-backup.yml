name: Sauvegarde base de données

# Sauvegarde quotidienne de la base de production via pg_dump, stockée comme artefact
# GitHub (hors Railway — survit à une réinitialisation du service Postgres).
#
# Prérequis (une seule fois) :
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#     Nom   : BACKUP_DATABASE_URL
#     Valeur: la chaîne de connexion PUBLIQUE de la base Railway
#             (service Postgres → Variables → DATABASE_PUBLIC_URL, host en *.proxy.rlwy.net).
#   ⚠️ Pas l'URL interne (*.railway.internal), inaccessible depuis GitHub.
#
# Restauration d'une archive :
#   pg_restore --clean --if-exists --no-owner -d "$DATABASE_URL" backup-AAAAMMJJ-HHMMSS.dump

on:
  schedule:
    - cron: '0 3 * * *' # tous les jours à 03:00 UTC
  workflow_dispatch: {} # déclenchement manuel (pour tester)

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier le secret
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          if [ -z "$BACKUP_DATABASE_URL" ]; then
            echo "::error::Secret BACKUP_DATABASE_URL absent. Ajoutez-le (DATABASE_PUBLIC_URL de Railway)."
            exit 1
          fi

      - name: Installer pg_dump 17 (PGDG)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump de la base
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          ts=$(date -u +%Y%m%d-%H%M%S)
          # Format custom (-Fc) : compressé + restaurable sélectivement via pg_restore.
          pg_dump "$BACKUP_DATABASE_URL" --no-owner --no-privileges -Fc -f "backup-$ts.dump"
          ls -lh backup-*.dump
          echo "ARCHIVE=backup-$ts.dump" >> "$GITHUB_ENV"

      - name: Conserver l'archive
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.ARCHIVE }}
          path: backup-*.dump
          retention-days: 30
          if-no-files-found: error
