<!-- @dsCard group="Brand" viewport="700x220" name="Symbol & clear space" subtitle="360 mark · favicon · min sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display:flex; align-items:center; gap: 36px; }
  .mark { position: relative; padding: 22px; border: 1px dashed var(--border-strong); border-radius: var(--radius-md); }
  .mark img { width: 96px; height: 96px; display:block; }
  .sizes { display:flex; align-items:flex-end; gap: 24px; }
  .sz { text-align:center; }
  .sz img { display:block; margin: 0 auto; }
  .cap { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .note { font-size: 12.5px; color: var(--text-body); margin-top: 14px; max-width: 560px; }
</style>
</head>
<body>
<div class="grid">
  <div class="mark"><img src="../assets/logo-pr-event-360-icon.png" alt="symbole 360" /></div>
  <div class="sizes">
    <div class="sz"><img src="../assets/logo-pr-event-360-icon.png" width="64" height="64" /><div class="cap">App icon</div></div>
    <div class="sz"><img src="../assets/logo-pr-event-360-icon.png" width="40" height="40" /><div class="cap">Nav</div></div>
    <div class="sz"><img src="../assets/logo-pr-event-360-icon.png" width="32" height="32" /><div class="cap">Favicon · min 32px</div></div>
  </div>
</div>
<p class="note">Zone de protection : laisser autour du logo un espace minimum équivalent à la hauteur du « 360 ». Logo complet web : min. 180px de large. Pour favicon, utiliser uniquement le monogramme PR dans le cercle.</p>
</body>
</html>
