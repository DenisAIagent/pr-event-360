<!-- @dsCard group="Colors" viewport="700x140" name="Colour balance" subtitle="60% light · 25% navy · 10% blue · 5% functional" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .bar { display: flex; height: 56px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-default); }
  .seg { display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
  .legend { margin-top: 12px; font-size: 12.5px; color: var(--text-body); }
</style>
</head>
<body>
<div class="bar">
  <div class="seg" style="flex:60;background:#F5F7FA;color:#4A5568">60% Blanc / gris clair</div>
  <div class="seg" style="flex:25;background:#07142F;color:#fff">25% Bleu nuit</div>
  <div class="seg" style="flex:10;background:#1598D3;color:#fff">10%</div>
  <div class="seg" style="flex:5;background:linear-gradient(90deg,#2FBF71,#F5A623,#E24D4D)"></div>
</div>
<p class="legend">Le bleu digital reste un <strong style="color:var(--text-primary)">accent</strong> — jamais une couleur dominante. Les couleurs fonctionnelles (vert / orange / rouge) sont réservées aux statuts.</p>
</body>
</html>
