<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="8px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .scale { display:flex; align-items:flex-end; gap: 18px; }
  .item { text-align:center; }
  .box { background: var(--color-blue-50); border: 1px solid var(--color-blue); border-radius: 4px; }
  .lbl { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .val { font-size: 12px; font-weight:600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="scale">
  <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="val">2</div><div class="lbl">8px</div></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="val">3</div><div class="lbl">12px</div></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="val">4</div><div class="lbl">16px</div></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="val">6</div><div class="lbl">24px</div></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="val">8</div><div class="lbl">32px</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="val">12</div><div class="lbl">48px</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="val">16</div><div class="lbl">64px</div></div>
  <div class="item"><div class="box" style="width:96px;height:96px"></div><div class="val">24</div><div class="lbl">96px</div></div>
</div>
</body>
</html>
