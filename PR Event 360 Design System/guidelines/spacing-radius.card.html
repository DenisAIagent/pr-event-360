<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & elevation" subtitle="Soft rounding · very light shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); font-family: var(--font-sans); }
  .grid { display:flex; gap: 20px; align-items:center; }
  .item { text-align:center; }
  .box { width: 84px; height: 64px; background: var(--surface-card); border: 1px solid var(--border-default); display:flex; align-items:center; justify-content:center; }
  .lbl { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .val { font-size: 12px; font-weight:600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="val">sm</div><div class="lbl">8px · boutons</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="val">md</div><div class="lbl">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="val">lg</div><div class="lbl">16px · cartes</div></div>
  <div class="item" style="margin-left:24px"><div class="box" style="border-radius:16px;box-shadow:0 1px 3px rgba(7,20,47,.06),0 1px 2px rgba(7,20,47,.04)"></div><div class="val">sm</div><div class="lbl">shadow</div></div>
  <div class="item"><div class="box" style="border-radius:16px;box-shadow:0 4px 16px rgba(7,20,47,.06)"></div><div class="val">md</div><div class="lbl">shadow</div></div>
  <div class="item"><div class="box" style="border-radius:16px;box-shadow:0 12px 32px rgba(7,20,47,.08)"></div><div class="val">lg</div><div class="lbl">shadow</div></div>
</div>
</body>
</html>
