<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .spec { display:flex; align-items:baseline; gap:16px; padding: 10px 0; border-bottom: 1px solid var(--border-default); }
  .tag { width: 110px; flex-shrink:0; font-family: var(--font-sans); font-size: 11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color: var(--text-muted); }
  .sample { color: var(--text-primary); font-family: var(--font-display); }
</style>
</head>
<body>
<div class="spec"><span class="tag">H1 · 48 · Light</span><span class="sample" style="font-size:46px;font-weight:300;letter-spacing:-0.02em">La plateforme RP des événements</span></div>
<div class="spec"><span class="tag">H2 · 36 · Regular</span><span class="sample" style="font-size:34px;font-weight:400">Centralisez vos contacts presse</span></div>
<div class="spec"><span class="tag">H3 · 24 · SemiBold</span><span class="sample" style="font-size:24px;font-weight:600">Suivi des accréditations</span></div>
</body>
</html>
