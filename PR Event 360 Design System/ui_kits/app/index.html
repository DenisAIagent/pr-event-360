<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PR Event 360 — Application</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: var(--surface-subtle); }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel">
  const TITLES = {
    dashboard: ['Tableau de bord', "Vue d'ensemble de vos relations presse événementielles"],
    contacts: ['Contacts presse', '247 journalistes · 18 médias suivis'],
    invitations: ['Invitations', 'Suivi des envois et réponses'],
    events: ['Événements', '3 événements actifs ce trimestre'],
    press: ['Communiqués', 'Rédaction et diffusion'],
    accreditations: ['Accréditations', 'Validation des demandes presse'],
    reporting: ['Reporting média', 'Retombées et performance'],
  };

  function Placeholder({ label }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 360, color: 'var(--text-muted)', gap: 12, background: 'var(--surface-card)', border: '1px dashed var(--border-strong)', borderRadius: 'var(--radius-lg)' }}>
        <Icon name="layers" size={30} color="var(--border-strong)" />
        <div style={{ fontSize: 14 }}>L'écran « {label} » s'affichera ici.</div>
      </div>
    );
  }

  function App() {
    const [active, setActive] = React.useState('dashboard');
    const [title, subtitle] = TITLES[active];
    let content;
    if (active === 'dashboard') content = <Dashboard />;
    else if (active === 'contacts') content = <Contacts />;
    else if (active === 'events') content = <Events />;
    else if (active === 'invitations') content = <Invitations />;
    else if (active === 'press') content = <PressReleases />;
    else if (active === 'accreditations') content = <Accreditations />;
    else if (active === 'reporting') content = <Reporting />;
    else content = <Placeholder label={title} />;

    return (
      <div style={{ display: 'flex', height: '100%', fontFamily: 'var(--font-sans)' }}>
        <Sidebar active={active} onNavigate={setActive} />
        <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <Topbar title={title} subtitle={subtitle} onCreate={() => setActive('events')} />
          <div style={{ flex: 1, overflowY: 'auto', padding: 32 }}>{content}</div>
        </main>
      </div>
    );
  }

  // Wait for babel-compiled sibling scripts to define globals
  function mountWhenReady() {
    if (window.Sidebar && window.Dashboard && window.Reporting) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } else {
      setTimeout(mountWhenReady, 40);
    }
  }
  mountWhenReady();
</script>
</body>
</html>
