<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input } = window.PREvent360DesignSystem_82909b;
  const Icon = ({ name, size = 16 }) => {
    const ref = React.useRef(null);
    React.useEffect(() => { if (ref.current) { ref.current.innerHTML = ''; const el = document.createElement('i'); el.setAttribute('data-lucide', name); ref.current.appendChild(el); window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': 1.75 } }); } });
    return <span ref={ref} style={{ display: 'inline-flex' }} />;
  };
  function Demo() {
    return (
      <div className="grid">
        <Input label="Email du journaliste" placeholder="prenom@media.fr" leadingIcon={<Icon name="mail" />} hint="Adresse professionnelle" />
        <Input label="Média" placeholder="Le Monde" leadingIcon={<Icon name="newspaper" />} defaultValue="France Inter" />
        <Input label="Nom du contact" placeholder="Camille Roy" />
        <Input label="Téléphone" placeholder="+33…" error="Numéro invalide" defaultValue="06 12" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
