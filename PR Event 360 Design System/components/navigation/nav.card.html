<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 24px; background: var(--surface-card); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs } = window.PREvent360DesignSystem_82909b;
  const Icon = ({ name, size = 15 }) => {
    const ref = React.useRef(null);
    React.useEffect(() => { if (ref.current) { ref.current.innerHTML = ''; const el = document.createElement('i'); el.setAttribute('data-lucide', name); ref.current.appendChild(el); window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': 1.75 } }); } });
    return <span ref={ref} style={{ display: 'inline-flex' }} />;
  };
  function Demo() {
    const [tab, setTab] = React.useState('contacts');
    return (
      <Tabs value={tab} onChange={setTab} items={[
        { value: 'contacts', label: 'Contacts presse', icon: <Icon name="users" />, count: 247 },
        { value: 'invitations', label: 'Invitations', icon: <Icon name="mail" />, count: 68 },
        { value: 'accreditations', label: 'Accréditations', icon: <Icon name="badge-check" />, count: 42 },
        { value: 'retombees', label: 'Retombées', icon: <Icon name="newspaper" /> },
      ]} />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
