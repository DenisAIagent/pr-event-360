<!-- @dsCard group="Components" viewport="700x430" name="Core — Buttons, Badges, Cards, Avatar" subtitle="Actions, status pills, surfaces & identities" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Card, Avatar } = window.PREvent360DesignSystem_82909b;
  const Icon = ({ name, size = 16 }) => {
    const ref = React.useRef(null);
    React.useEffect(() => { if (ref.current) { ref.current.innerHTML = ''; const el = document.createElement('i'); el.setAttribute('data-lucide', name); ref.current.appendChild(el); window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': 1.75 } }); } });
    return <span ref={ref} style={{ display: 'inline-flex' }} />;
  };

  function Demo() {
    return (
      <div>
        <div className="row"><span className="label">Buttons</span>
          <Button variant="primary" leadingIcon={<Icon name="plus" />}>Créer un événement</Button>
          <Button variant="secondary">Importer une liste</Button>
          <Button variant="premium">Demander une démo</Button>
          <Button variant="ghost" trailingIcon={<Icon name="arrow-right" />}>Voir plus</Button>
          <Button variant="primary" size="sm">Petit</Button>
          <Button variant="secondary" disabled>Désactivé</Button>
        </div>
        <div className="row"><span className="label">Badges</span>
          <Badge tone="success" dot>Accrédité</Badge>
          <Badge tone="warning">À relancer</Badge>
          <Badge tone="danger">Annulé</Badge>
          <Badge tone="info">VIP / Média clé</Badge>
          <Badge tone="neutral">Brouillon</Badge>
          <Badge tone="navy">Premium</Badge>
        </div>
        <div className="row"><span className="label">Avatars</span>
          <Avatar name="Camille Roy" tone="blue" />
          <Avatar name="Le Monde" tone="navy" />
          <Avatar name="Studio RP" tone="slate" size={48} />
        </div>
        <div className="row"><span className="label">Cards</span>
          <Card style={{ width: 300 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
              <strong style={{ color: 'var(--text-primary)' }}>Accréditations</strong>
              <Badge tone="success">42 validées</Badge>
            </div>
            <p style={{ fontSize: 14, color: 'var(--text-body)', margin: 0 }}>Sur 68 demandes reçues pour le salon.</p>
          </Card>
          <Card accent interactive style={{ width: 300 }}>
            <strong style={{ color: 'var(--text-primary)' }}>Carte featured</strong>
            <p style={{ fontSize: 14, color: 'var(--text-body)', margin: '8px 0 0' }}>Filet d'accent bleu digital, survol surélevé.</p>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
